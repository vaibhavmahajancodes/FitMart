# Issue Labeler Configuration - Applies multiple relevant labels based on issue content

# Bug reports (can also add other labels like 'help wanted' if needed)
bug:
  - '(bug|fix|error|issue|problem|crash|broken|fails|not working|unexpected|exception|stack trace|debug)'

# Enhancement/Feature requests
enhancement:
  - '(feature|enhancement|improve|add|new|support|implement|create|build|make|upgrade|suggest|proposal|request)'

# Documentation improvements
documentation:
  - '(docs|documentation|readme|guide|tutorial|explanation|clarify|update readme|doc|wiki|comment|explain|typo)'

# Security vulnerabilities
security:
  - '(security|vulnerability|exploit|auth|hack|breach|injection|xss|cors|csrf|encryption|private|leak|expose|api key|secret|token|firebase rule)'

# UI/UX improvements
UI:
  - '(ui|ux|interface|design|responsive|layout|styling|animation|visual|appearance|mobile view|tablet|accessibility|a11y|cursor|hover|click|button|modal|dropdown|navigation|sidebar|header|footer|spacing|padding|margin|color|theme|dark mode|font|typography|icon)'

# Questions (can also add 'help wanted' automatically)
question:
  - '(question|how to|help|what is|why does|^how\??|^what\??|^can someone|^is it possible|^does this|clarify|doubt|confused|uncertain)'

# Refactoring
refactor:
  - '(refactor|clean|restructure|organize|optimize|improve performance|code quality|technical debt|rewrite|reorganize|rename|move|extract|split|merge|simplify|DRY|SOLID|cleanup)'

# Good first issue (for beginners)
good first issue:
  - '(good first issue|beginner|new contributor|easy|simple|starter|first time|novice|onboarding|help wanted for beginners|low hanging fruit)'

# Help wanted (requires extra attention)
help wanted:
  - '(help wanted|contribution needed|looking for contributor|need assistance|someone please|can anyone|collaboration wanted|seeking help|volunteer)'

# Invalid issues (usually requires manual verification)
invalid:
  - '(invalid|not relevant|off topic|spam|duplicate of|wrong repo|doesn''t belong|inappropriate)'

# Duplicate issues
duplicate:
  - '(duplicate|already reported|same as|existing issue|dupe|redundant|already exists|#\d+)'

# Won't fix (community identified)
wontfix:
  - '(wontfix|won''t fix|not planned|rejected|out of scope|not a priority|wont do|not fixing)'

# Blocked issues
blocked:
  - '(blocked|waiting on|depends on|blocked by|stuck because|awaiting|cannot proceed because|prerequisite|dependency|blocking issue|#\d+ blocks)'

# Workout/Exercise features
workout:
  - '(workout|exercise|fitness|gym|training|calendar|tracker|bmi|tdee|calorie|nutrition|diet|workout plan|exercise page|notes page|tracker page|fitness center|nearby gym)'

# Chatbot/Gemini AI
chatbot:
  - '(chatbot|gemini|ai|assistant|chat|conversation|bot|intelligent|auto reply|gemini api)'

# Payment/Razorpay
payment:
  - '(payment|razorpay|checkout|transaction|invoice|order|cart|checkout page|payment gateway|purchase|buy)'

# Authentication
authentication:
  - '(auth|login|signup|firebase|register|password|email verification|google signin|oauth|session|token|jwt)'

# Database/MongoDB
database:
  - '(database|mongodb|mongoose|schema|model|query|index|collection|document|seed|migration|data model)'

# API/Backend endpoints
api:
  - '(api|endpoint|route|rest|http|request|response|json|middleware|controller|service)'

# Performance
performance:
  - '(performance|speed|slow|fast|cache|redis|lazy load|optimization|bottleneck|response time|load time)'

# Testing
testing:
  - '(test|unit test|integration test|e2e|jest|supertest|mock|coverage|ci|cd|workflow|github action)'

# Deployment/Infrastructure
deployment:
  - '(deploy|production|staging|vercel|railway|render|hosting|docker|container|ci/cd|environment|dev|prod)'